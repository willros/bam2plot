[workspace]
name = "bam2plot"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.10"
pysam = "==0.22.0"
numpy = "*"
pandas = "*"
seaborn = "==0.13.2"
polars = "==0.20.15"
mappy = "==2.28"
pyfastx = "*"
pyarrow = "*"
matplotlib-base = "*"
pytest = ">=7.0"
black = ">=26.3.1,<27"
python-build = ">=1.4.0,<2"
twine = ">=6.2.0,<7"

[pypi-dependencies]
bam2plot = { path = ".", editable = true }

[tasks]
format = "black setup.py bam2plot/__init__.py bam2plot/main.py tests/*.py"
format-check = "black --check setup.py bam2plot/__init__.py bam2plot/main.py tests/*.py"
test = "pytest tests/ -v"
